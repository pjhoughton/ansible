git_repo_paths:
  - /home/paul/docker
  
  
git_repositories:
  - name: docker
    path: /home/paul/docker
    url: git@github.com:pjhoughton/docker.git
    
    
ufw_custom_ports:
  - { port: "6767",  proto: "tcp" }   # Bazarr
  - { port: "7878",  proto: "tcp" }   # Radarr
  - { port: "8080",  proto: "tcp" }   # Sabnzbd
