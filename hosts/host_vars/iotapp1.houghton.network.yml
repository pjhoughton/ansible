  # NFS client
  - { port: "111",   proto: "tcp" }
  - { port: "111",   proto: "udp" }
  - { port: "2049",  proto: "tcp" }
  - { port: "2049",  proto: "udp" }

  # Plex core
  - { port: "32400", proto: "tcp" }

