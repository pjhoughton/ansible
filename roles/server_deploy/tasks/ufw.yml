---
- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Set default UFW policies
  community.general.ufw:
    state: enabled
    policy: "{{ item.policy }}"
    direction: "{{ item.direction }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
    - { direction: routed,  policy: deny }
  become: true

- name: Allow baseline ports (SSH + HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
  loop:
    - { port: "22" }
    - { port: "443" }
    - { port: "9090" }
  become: true

- name: Allow host-specific ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop: "{{ ufw_custom_ports }}"
  when: ufw_custom_ports is defined
  become: true

- name: Enable UFW logging
  community.general.ufw:
    logging: low
  become: true
