---
# Update the cache and clean the package manager 
# Suitable for Debian-based distros such as Ubuntu and Red Hat-based distros such as CentOS
# Tested on Ubuntu 24.04

- name: Update apt cache and clean package manager on Debian-based distros
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
    autoclean: yes
    autoremove: yes
    lock_timeout: 120
    update_cache_retries: 5
    update_cache_retry_max_delay: 15
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts.get('distribution') in ['Ubuntu', 'Debian']



# ---------------------------------------------------------
# RedHat (YUM)
# ---------------------------------------------------------
- name: Update yum cache
  ansible.builtin.yum:
    update_cache: yes
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) < 8

- name: Clean yum cache
  ansible.builtin.command:
    cmd: yum clean all
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) < 8

- name: Autoremove unnecessary packages (yum)
  ansible.builtin.command:
    cmd: yum autoremove
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) < 8


# ---------------------------------------------------------
# RedHat (DNF)
# ---------------------------------------------------------
- name: Update dnf cache
  ansible.builtin.dnf:
    update_cache: yes
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) >= 8

- name: Clean dnf cache
  ansible.builtin.command:
    cmd: dnf clean all
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) >= 8

- name: Autoremove unnecessary packages (dnf)
  ansible.builtin.command:
    cmd: dnf autoremove
  when:
    - ansible_facts.get('os_family') == "RedHat"
    - (ansible_facts.get('distribution_major_version') | default(0) | int) >= 8
