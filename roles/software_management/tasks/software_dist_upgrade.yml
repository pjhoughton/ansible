---
# Main tasks for software_management role

# ---------------------------------------------------------
# Debian / Ubuntu upgrade
# ---------------------------------------------------------
- name: Perform dist-upgrade on Debian-based distros
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
    upgrade: dist
    autoremove: yes
    autoclean: yes
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']


# ---------------------------------------------------------
# RedHat upgrade
# ---------------------------------------------------------
- name: Perform upgrade on Red Hat-based distros with yum
  ansible.builtin.yum:
    name: '*'
    state: latest
  when: ansible_facts['os_family'] == "RedHat" and ansible_distribution_major_version | int < 8

- name: Perform upgrade on Red Hat-based distros with dnf
  ansible.builtin.dnf:
    name: '*'
    state: latest
  when: ansible_facts['os_family'] == "RedHat" and ansible_distribution_major_version | int >= 8


# ---------------------------------------------------------
# Debian reboot detection
# ---------------------------------------------------------
- name: Check if reboot required (Debian/Ubuntu)
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: debian_reboot_file
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']


# ---------------------------------------------------------
# RedHat reboot detection
# ---------------------------------------------------------
- name: Check if needs-restarting exists
  ansible.builtin.stat:
    path: /usr/bin/needs-restarting
  register: needs_restarting_bin
  when: ansible_facts['os_family'] == "RedHat"

- name: Check if reboot is required with needs-restarting
  ansible.builtin.command: needs-restarting -r
  register: yum_dnf_reboot_check
  failed_when: yum_dnf_reboot_check.rc not in [0, 1]
  changed_when: false
  when:
    - ansible_facts['os_family'] == "RedHat"
    - needs_restarting_bin.stat.exists


# ---------------------------------------------------------
# Unified reboot_required fact
# ---------------------------------------------------------
- name: Set reboot_required fact (Debian)
  ansible.builtin.set_fact:
    reboot_required: "{{ debian_reboot_file.stat.exists }}"
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']

- name: Set reboot_required fact (RedHat)
  ansible.builtin.set_fact:
    reboot_required: "{{ yum_dnf_reboot_check.rc == 1 }}"
  when:
    - ansible_facts['os_family'] == "RedHat"
    - needs_restarting_bin.stat.exists


# ---------------------------------------------------------
# Notify handler if reboot needed
# ---------------------------------------------------------
- name: Notify reboot handler if necessary
  ansible.builtin.debug:
    msg: "Reboot required, notifying the handler."
  notify: Reboot the system if required
  when: reboot_required
