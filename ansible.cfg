[defaults]
# Python & inventory behaviour
interpreter_python = auto_silent
gathering = smart
inventory = /home/paul/ansible/hosts/simple_inventory

# Authentication
remote_user = usr_ansible
private_key_file = ~/.ssh/ansible_ed25519
vault_password_file = ./pass_file/ansible_vault.pass

# Connection behaviour
host_key_checking = False
timeout = 30
forks = 10
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
scp_if_ssh = True

# Output formatting (modern Ansible 2.21)
stdout_callback = ansible.builtin.default
result_format = yaml
display_skipped_hosts = False

# Modern callback system
callbacks_enabled = ansible.builtin.timer

# Execution strategy
strategy = free

# Clean fact behaviour
inject_facts_as_vars = False

# Ignore junk inventory files
inventory_ignore_extensions = .bak, .tmp, .old

# Paths
library = ./library
module_utils = ./module_utils
filter_plugins = ./filter_plugins
roles_path = ./roles
remote_tmp = /home/paul/tmp/.ansible_tmp
editor = nano

# Fact caching
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[inventory]
enable_plugins = yaml, ini, community.general.xen_orchestra
cache = True
cache_plugin = jsonfile
cache_plugin_connection = /home/paul/ansible/cache/
